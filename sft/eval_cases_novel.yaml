# ============================================================
# Expansion v3 (2026-04-20) — two goals:
#
#   (A) Close coverage GAPS — tools that currently have 0 or 1
#       eval case. A single-case tool has no redundancy against
#       noise; zero-case tools aren't tested at all. Target ≥3
#       cases per tool.
#
#   (B) Pattern-novel generalization — cases whose STRUCTURE the
#       LoRA likely didn't see in training (not just new content
#       plugged into a trained template). These are the real
#       generalization probes; the earlier cases mostly tested
#       surface paraphrase within trained patterns.
#
# Still disjoint from training (guarded by assert_disjoint.py).
# ============================================================

# ---- (A) Gap fills: get_digest, graph, circuit, update_memory, ----
# ----     get_news, get_alerts, math, find_places, web_search   ----

# get_digest
- prompt: Give me my morning briefing.
  expected_tool: get_digest
  notes: gap fill, canonical briefing request.
- prompt: Run through what's on the agenda today.
  expected_tool: get_digest
  notes: gap fill, paraphrase of digest.
- prompt: Quick summary of alerts and news, please.
  expected_tool: get_digest
  notes: gap fill, compound phrasing that should map to the unified digest tool.

# graph
- prompt: Plot sin(x) from 0 to 2 pi.
  expected_tool: graph
  notes: gap fill, trigonometric plot.
- prompt: Show me a graph of y equals x squared.
  expected_tool: graph
  notes: gap fill, polynomial plot.
- prompt: Chart the last 7 days of temperatures.
  expected_tool: graph
  notes: gap fill, time-series plot (may depend on other tools for data).

# circuit
- prompt: What's the current through a 220 ohm resistor at 9 volts?
  expected_tool: circuit
  notes: gap fill, Ohm's law question.
- prompt: Calculate the RC time constant for 1 microfarad and 10 kilohms.
  expected_tool: circuit
  notes: gap fill, RC product.
- prompt: Voltage divider output for 12V across 10k and 4.7k resistors.
  expected_tool: circuit
  notes: gap fill, divider formula.

# update_memory
# NOTE: update_memory's actual arg key is `fact`, not `value`. My v2
# draft used `value`; fixed to `fact` so the args-strict check works.
- prompt: Remember that my favorite color is emerald green.
  expected_tool: update_memory
  expected_args:
    fact: emerald
  notes: gap fill + args, explicit "remember that X" pattern.
- prompt: Save that I prefer morning meetings over afternoon ones.
  expected_tool: update_memory
  expected_args:
    fact: morning
  notes: gap fill + args, preference save.
- prompt: Note for next time — I'm allergic to peanuts.
  expected_tool: update_memory
  expected_args:
    fact: peanut
  notes: gap fill + args, medical preference.

# get_news (+2)
- prompt: What's happening in tech today?
  expected_tool: get_news
  notes: gap fill, topic-filtered news.
- prompt: Any breaking headlines right now?
  expected_tool: get_news
  notes: gap fill, urgent-news phrasing.

# get_alerts (+2)
- prompt: Any severe weather warnings in my area?
  expected_tool: get_alerts
  notes: gap fill, explicit alert query.
- prompt: Are there any active hazard alerts?
  expected_tool: get_alerts
  notes: gap fill, generic alert query.

# math (+2)
- prompt: Solve 3 x squared plus 5 x minus 2 equals 0.
  expected_tool: math
  notes: gap fill, quadratic equation.
- prompt: What's 15 percent of 240?
  expected_tool: math
  notes: gap fill, percentage calculation.

# find_places (+2)
- prompt: Best pizza place near me?
  expected_tool: find_places
  notes: gap fill, local search.
- prompt: Where can I find a 24-hour pharmacy nearby?
  expected_tool: find_places
  notes: gap fill, local filtered search.

# web_search (+2)
- prompt: Top reviews of the Sony WH-1000XM5 headphones.
  expected_tool: web_search
  notes: gap fill, product review query (wiki wouldn't have reviews).
- prompt: How do I replace the thermostat in a Honda Civic?
  expected_tool: web_search
  notes: gap fill, how-to / DIY guide (wiki is for facts, not instructions).

# ---- (B) Pattern-novel generalization probes ----

# -- conditional / contextual reminders (pattern not in training) --
- prompt: When I get home, remind me to feed the cat.
  expected_tool: schedule_reminder
  notes: novel pattern — conditional trigger ("when X happens") rather than trained "remind me to X at TIME".
- prompt: Remind me after my 3pm meeting to send the report.
  expected_tool: schedule_reminder
  notes: novel pattern — relative trigger ("after EVENT").
- prompt: Once I finish dinner, nudge me about my pills.
  expected_tool: schedule_reminder
  notes: novel pattern — "once X, nudge me".
- prompt: If traffic's bad tomorrow, ping me earlier than 8am.
  expected_tool: schedule_reminder
  notes: novel pattern — conditional + time-adjusted reminder.
- prompt: Wake me if a storm comes through tonight.
  expected_tool:
    - schedule_reminder
    - null
  notes: novel pattern — weather-conditional alarm. Either a reminder or "can't do that" is reasonable; accept both.

# -- indirect / wrapped weather queries --
- prompt: Should I bring a jacket today?
  expected_tool: get_weather
  notes: novel pattern — wrapped weather inquiry ("should I X?" where X depends on weather).
- prompt: Is it pool weather in Miami right now?
  expected_tool: get_weather
  notes: novel pattern — colloquial weather framing.
- prompt: How's tomorrow shaping up for a run?
  expected_tool: get_weather
  notes: novel pattern — activity-context weather query.
- prompt: Can I BBQ outside today?
  expected_tool: get_weather
  notes: novel pattern — activity-permission phrasing.
- prompt: Will I need sunscreen in San Diego this weekend?
  expected_tool: get_weather
  notes: novel pattern — future-activity weather forecast.

# -- transformational compound queries --
- prompt: Compare Paris and London weather side by side.
  expected_tool: get_weather
  notes: novel pattern — explicit comparison (not just "A and B").
- prompt: Which costs more right now, gold or silver?
  expected_tool: tracker
  notes: novel pattern — "which of A or B" comparison.
- prompt: Pull up news about Japan and the US.
  expected_tool: get_news
  notes: novel pattern — multi-topic news query.
- prompt: Find both a coffee shop and a pharmacy nearby.
  expected_tool: find_places
  notes: novel pattern — compound local search.
- prompt: Convert 100 USD to EUR, and also to GBP.
  expected_tool: convert
  notes: novel pattern — one value, multiple target units.

# -- interrupted / corrected multi-turn --
- history:
    - user: Set a timer for 10 minutes.
  prompt: Wait, make it 15.
  expected_tool: schedule_reminder
  notes: novel pattern — interrupted correction on a reminder.
- history:
    - user: Weather in Tokyo.
  prompt: Actually I meant Osaka.
  expected_tool: get_weather
  expected_args:
    location: Osaka
  notes: novel pattern — corrected location mid-turn.
- history:
    - user: Convert 100 USD to EUR.
  prompt: And also to GBP?
  expected_tool:
    - convert
    - tracker
  notes: novel pattern — compound follow-up. Either tool is defensible.
- history:
    - user: Remind me to call Dad at 3pm.
  prompt: Scratch that, never mind.
  expected_tool: null
  notes: novel pattern — retraction after a reminder is a no-op (no cancel tool).
- history:
    - user: Search for carbonara recipes.
  prompt: Actually, try bolognese instead.
  expected_tool: web_search
  expected_args:
    query: bolognese
  notes: novel pattern — corrected search query.

# -- ambiguous / rhetorical (must resist firing) --
- prompt: What about that thing we talked about?
  expected_tool: null
  notes: novel pattern — unresolvable reference, must not hallucinate into a tool.
- prompt: Tell me more about the second one.
  expected_tool: null
  notes: novel pattern — ordinal reference without context.
- prompt: Remember the other day?
  expected_tool: null
  notes: novel pattern — figurative "remember", conversational.
- prompt: Who's that?
  expected_tool: null
  notes: novel pattern — pronominal reference with no antecedent.
- prompt: What do you mean?
  expected_tool: null
  notes: novel pattern — clarification request, not a routable intent.
