# ============================================================
# Expansion v2 (2026-04-20) — adds ~50 cases across under-served
# categories: compound queries, historical-fact wiki, tool-arg
# extraction, richer multi-turn, harder figurative decoys, and
# no-tool-available edges. Guarded by sft/scripts/assert_disjoint.py
# against train-set leakage.
# ============================================================

# ---- compound "A and B" queries ----
- prompt: Tell me the weather and what time it is.
  expected_tool:
    - get_weather
    - get_time
  notes: compound; either tool is a valid first-call.
- prompt: What's the weather in Paris and London?
  expected_tool: get_weather
  notes: compound location; single-tool call per location is expected, grade the first.
- prompt: Convert 50 euros to dollars and give me the news.
  expected_tool: convert
  notes: compound; convert is the primary, news is secondary.
- prompt: Set an alarm for 7am and tell me the weather tomorrow.
  expected_tool: schedule_reminder
  notes: compound; reminder primary, weather follow-up.
- prompt: Look up Marie Curie and Nikola Tesla.
  expected_tool: wiki
  notes: compound wiki; both subjects should each trigger a wiki lookup.
- prompt: Convert 1 kilo to pounds and 100 miles to km.
  expected_tool: convert
  notes: compound conversion.
- prompt: What's the gold price and the USD/JPY rate?
  expected_tool: tracker
  notes: compound tracker query.
- prompt: What's the weather in New York and is there any severe weather alert?
  expected_tool:
    - get_weather
    - get_alerts
  notes: compound weather + alerts; either is acceptable as first call.

# ---- historical fact lookups ----
- prompt: How much did a loaf of bread cost in 1950?
  expected_tool: wiki
  notes: historical price inquiry; wiki over web_search for well-known facts.
- prompt: What was the price of gas in 1980?
  expected_tool: wiki
  notes: historical inflation-style question.
- prompt: When was the Berlin Wall built?
  expected_tool: wiki
  notes: historical date question, wiki classic.
- prompt: How much was the minimum wage in 1970?
  expected_tool: wiki
  notes: historical economics fact.
- prompt: What year did Queen Elizabeth II die?
  expected_tool: wiki
  notes: historical event, wiki.
- prompt: How much was a house in 1960s America?
  expected_tool: wiki
  notes: historical inflation question, same family as #26 "in 1970 money".
- prompt: What was life expectancy in 1920?
  expected_tool: wiki
  notes: historical demographic fact.
- prompt: How much did a Model T cost when it was new?
  expected_tool: wiki
  notes: historical product price.

# ---- tool arg extraction (strict) ----
- prompt: Convert 72.5 fahrenheit to celsius.
  expected_tool: convert
  expected_args:
    value: '72.5'
    from_unit: fahrenheit
    to_unit: celsius
  notes: args, fractional value + temperature units.
- prompt: What's the weather in St Petersburg, Russia?
  expected_tool: get_weather
  expected_args:
    location: St Petersburg
  notes: args, disambiguated city name (Russia vs Florida).
- prompt: Convert 1.5 lbs to grams.
  expected_tool: convert
  expected_args:
    value: '1.5'
    from_unit: lbs
    to_unit: g   # substring-match: accepts both "g" abbreviation and "grams"
  notes: "args, fractional weight. `to_unit` expected as `g` since substring matching accepts both `g` and `grams`."
- prompt: Weather in São Paulo.
  expected_tool: get_weather
  expected_args:
    location: São Paulo
  notes: args, diacritics + foreign city name.
- prompt: Set a reminder for 7:15 am tomorrow to take out the trash.
  expected_tool: schedule_reminder
  expected_args:
    message: trash
  notes: args, explicit time + message substring.
- prompt: What's the weather at zip 10001?
  expected_tool: get_weather
  expected_args:
    location: '10001'
  notes: args, numeric ZIP code as location.
- prompt: Look up the population of Monaco.
  expected_tool: wiki
  expected_args:
    query: Monaco
  notes: args, single-word subject.
- prompt: Search for the best carbonara recipe.
  expected_tool: web_search
  expected_args:
    query: carbonara
  notes: args, explicit search verb + recipe keyword.
- prompt: What's 12 times 18?
  expected_tool: math
  notes: basic arithmetic, routing-only check.
- prompt: Directions to the nearest coffee shop.
  expected_tool: find_places
  notes: local POI lookup; args not pinned (geolocation-dependent).

# ---- multi-turn follow-ups ----
