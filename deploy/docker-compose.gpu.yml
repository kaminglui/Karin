# Overlay: desktop / x86 host with NVIDIA GPU.
#
# Layered on top of docker-compose.yml — adds GPU reservations to the
# three CUDA-using services and uses the standard nvidia CUDA runtime
# as the base image for GPT-SoVITS.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.gpu.yml up -d
#
# Or via .env:
#   COMPOSE_FILE=deploy/docker-compose.yml:deploy/docker-compose.gpu.yml
#
# Requires NVIDIA Container Toolkit on the host.

services:

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  sovits:
    build:
      args:
        BASE_IMAGE: nvidia/cuda:12.4.1-runtime-ubuntu22.04
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  web:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - KARIN_STT_DEVICE=cuda
      - KARIN_STT_COMPUTE_TYPE=float16
