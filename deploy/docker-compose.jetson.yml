# Overlay: Jetson Orin (ARM64 + JetPack 6).
#
# Layered on top of docker-compose.yml — swaps base images to the
# dustynv L4T PyTorch images (CUDA torch pre-installed) and enables
# GPU passthrough via the JetPack-supplied NVIDIA runtime.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.jetson.yml up -d
#
# Or via .env:
#   COMPOSE_FILE=deploy/docker-compose.yml:deploy/docker-compose.jetson.yml
#
# JetPack 6 ships with NVIDIA Container Toolkit, so `--gpus all` /
# the deploy.resources GPU reservation just works.

# JetPack uses the LEGACY NVIDIA container runtime (not the modern
# CDI driver Docker's `--gpus` flag relies on). Using `runtime: nvidia`
# on each service is the JetPack-correct way to enable GPU access;
# `deploy.resources.reservations.devices` alone maps to CDI and
# errors out on Jetson with 'use --runtime=nvidia instead'.

services:

  ollama:
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  sovits:
    runtime: nvidia
    build:
      args:
        # dustynv's L4T PyTorch image: ARM64, JetPack 6 kernel, CUDA
        # torch pre-installed. The Dockerfile detects the pre-installed
        # torch and skips reinstalling, so the image builds fast.
        BASE_IMAGE: dustynv/l4t-pytorch:r36.2.0
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUTF8=1
      - PYTHONIOENCODING=utf-8

  web:
    runtime: nvidia
    build:
      args:
        BASE_IMAGE: dustynv/l4t-pytorch:r36.2.0
    environment:
      # Jetson defaults: cuda + int8_float16. Override via .env when the
      # ctranslate2 wheel available to you is CPU-only (common on ARM64
      # PyPI — the host ctranslate2 build matters). Setting
      #   KARIN_STT_DEVICE=cpu in .env
      # falls back to CPU Whisper, slow but functional.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - KARIN_STT_DEVICE=${KARIN_STT_DEVICE:-cuda}
      - KARIN_STT_COMPUTE_TYPE=${KARIN_STT_COMPUTE_TYPE:-int8_float16}
